<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1 id="yourname">Your name</h1>
    <button id="enter">Enter</button>


</body>
<script>
    document.getElementById('enter').addEventListener
        ('click', () => {
            const inputName = document.getElementById('yourname');
            inputName.textContent = 'Jirayut Suksakorn';
        });
</script>

</html>
